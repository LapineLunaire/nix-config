name: Update Tibia Client Hash

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch: {}

jobs:
  update:
    runs-on: debian
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install sudo
        run: apt update && apt install -y sudo

      - name: Install Nix
        uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b # v31

      # The download URL is unversioned; nix-prefetch-url uses Nix's own HTTP client, which bypasses Cloudflare's TLS fingerprint detection like the builtins.fetchurl in the package.
      - name: Update hash
        run: |
          hash=$(nix-prefetch-url https://static.tibia.com/download/tibia.x64.tar.gz)
          sed -i "s|sha256 = \"[a-z0-9]*\";|sha256 = \"${hash}\";|" pkgs/tibia/default.nix

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet pkgs/tibia/default.nix; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.check.outputs.changed == 'true'
        run: nix build .#tibia --no-link

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        uses: ./.forgejo/actions/commit-push
        with:
          paths: pkgs/tibia/default.nix
          message: "tibia: update client hash $(date +%Y-%m-%d)"
