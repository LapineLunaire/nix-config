name: Update Flake Inputs

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: {}

jobs:
  update:
    runs-on: docker
    steps:
      - name: Checkout
        run: |
          git clone https://x-access-token:${{ secrets.PUSH_TOKEN }}@git.lunaire.moe/${{ github.repository }}.git .
          git checkout ${{ github.ref_name }}

      - name: Update flake inputs
        run: nix --extra-experimental-features "nix-command flakes" flake update

      - name: Commit and push
        run: |
          if git diff --quiet flake.lock; then
            echo "No changes, skipping."
            exit 0
          fi
          git config user.name "Lapine"
          git config user.email "lapine@lunaire.eu"
          git add flake.lock
          git commit -m "flake: update inputs $(date +%Y-%m-%d)"
          git push
