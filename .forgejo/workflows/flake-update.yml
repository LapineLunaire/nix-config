name: Update Flake Inputs

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: {}

jobs:
  update:
    runs-on: debian
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install sudo
        run: apt update && apt install -y sudo

      - name: Install Nix
        uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b # v31

      - name: Update flake inputs
        run: nix flake update

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Evaluating the three host toplevels (sparkle transitively evaluates every microvm) catches breakage from updated inputs before a host pulls the new lock.
      - name: Eval host toplevels
        if: steps.check.outputs.changed == 'true'
        run: |
          for host in camellya sparkle sparxie; do
            nix eval ".#nixosConfigurations.${host}.config.system.build.toplevel.drvPath"
          done

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "Lapine"
          git config user.email "lapine@lunaire.eu"
          git add flake.lock
          git commit -m "flake: update inputs $(date +%Y-%m-%d)"
          git push
