name: Commit and push
description: Stage the given paths, commit with the repo git identity, and push
inputs:
  paths:
    description: Space-separated paths to stage
    required: true
  message:
    description: Commit message, expanded by the shell so $(date ...) works
    required: true
runs:
  using: composite
  steps:
    - name: Commit and push
      shell: bash
      run: |
        git config user.name "Lapine"
        git config user.email "lapine@lunaire.eu"
        git add ${{ inputs.paths }}
        git commit -m "${{ inputs.message }}"
        git push
